<body>
  <header><div class="header-inner"><a href="../" class="logo">🛠️ Web Tools</a><div class="hdr-actions"><a href="../../json-format/" class="btn-i">JP</a><button class="btn-i" onclick="toggleTheme()">🌙</button></div></div></header>
  <main>
    <h1>📋 JSON Formatter</h1>
    <p class="sub">Format, minify, and validate JSON data instantly</p>
    <div class="card">
      <textarea id="t" placeholder='{"key": "value", "array": [1, 2, 3]}'></textarea>
      <div class="err" id="err"></div>
      <div class="stats" id="st"></div>
      <div class="btns"><button class="btn btn-p" onclick="fmt()">✨ Format</button><button class="btn btn-s" onclick="mini()">📦 Minify</button><button class="btn btn-s" onclick="cp(t.value,this)">📋 Copy</button><button class="btn btn-s" onclick="t.value='';err.style.display='none';st.style.display='none'">Clear</button></div>
    </div>
    <div class="section"><h2>Related Tools</h2><div class="related"><a href="../char-count/">📝 Character Counter</a><a href="../password-gen/">🔐 Password Generator</a><a href="../unit-conv/">📐 Unit Converter</a></div></div>
  </main>
  <footer><a href="../privacy.html">Privacy Policy</a><a href="../../contact.html">Contact</a><br>&copy; 2026 Web Tools</footer>
  <script>
    function fmt(){err.style.display='none';try{const j=JSON.parse(t.value);t.value=JSON.stringify(j,null,2);info(j)}catch(e){err.textContent='\u274C '+e.message;err.style.display='block'}}
    function mini(){err.style.display='none';try{const j=JSON.parse(t.value);t.value=JSON.stringify(j);info(j)}catch(e){err.textContent='\u274C '+e.message;err.style.display='block'}}
    function info(j){st.textContent='Keys: '+ck(j)+' | Size: '+new Blob([JSON.stringify(j)]).size+' bytes';st.style.display='block'}
    function ck(o){if(typeof o!=='object'||o===null)return 0;if(Array.isArray(o))return o.reduce((a,v)=>a+ck(v),0);return Object.keys(o).reduce((a,k)=>a+1+ck(o[k]),0)}
    function cp(x,b){navigator.clipboard.writeText(x).then(()=>{const o=b.textContent;b.textContent='\u2713';setTimeout(()=>b.textContent=o,1500)})}
    function toggleTheme(){const d=document.documentElement;d.setAttribute('data-theme',d.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',d.getAttribute('data-theme'))}
    if(localStorage.getItem('theme'))document.documentElement.setAttribute('data-theme',localStorage.getItem('theme'));
  </script>

<body>
  <header><div class="header-inner"><a href="../" class="logo">🛠️ Web Tools</a><div class="hdr-actions"><a href="../en/age-calc/" class="btn-i">EN</a><button class="btn-i" onclick="toggleTheme()">🌙</button></div></div></header>
  <main>
    <h1>🎂 年齢計算</h1>
    <p class="sub">生年月日から現在の年齢を正確に計算</p>
    <div class="card">
      <label>生年月日</label><input type="date" id="bd" value="2000-01-01" oninput="calc()">
      <div class="grid">
        <div class="res"><div class="rl">年齢</div><div class="rv" id="age" style="color:var(--accent)">-</div></div>
        <div class="res"><div class="rl">次の誕生日まで</div><div class="rv" id="nb">-</div></div>
        <div class="res"><div class="rl">生まれてから</div><div class="rv" id="dl">-</div></div>
        <div class="res"><div class="rl">干支</div><div class="rv" id="eto">-</div></div>
      </div>
      <div class="detail" id="det"></div>
    </div>
    <div class="section"><h2>関連ツール</h2><div class="related"><a href="../warikan/">💰 割り勘計算</a><a href="../unit-conv/">📐 単位変換</a><a href="../moji-count/">📝 文字数カウンター</a></div></div>
  </main>
  <footer><a href="../privacy.html">プライバシーポリシー</a><a href="../contact.html">お問い合わせ</a><br>&copy; 2026 Web Tools</footer>
  <script>
    const ET=['\u5B50','\u4E11','\u5BC5','\u536F','\u8FB0','\u5DF3','\u5348','\u672A','\u7533','\u9149','\u620C','\u4EA5'];
    function calc(){const b=new Date(bd.value);if(isNaN(b))return;const n=new Date();let a=n.getFullYear()-b.getFullYear();const m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;let nx=new Date(n.getFullYear(),b.getMonth(),b.getDate());if(nx<=n)nx=new Date(n.getFullYear()+1,b.getMonth(),b.getDate());const dn=Math.ceil((nx-n)/864e5),dl=Math.floor((n-b)/864e5);age.textContent=a+'\u6B73';nb.textContent=dn+'\u65E5';document.getElementById('dl').textContent=dl.toLocaleString()+'\u65E5';eto.textContent=ET[(b.getFullYear()-4)%12]+'\u5E74';const mo=a*12+n.getMonth()-b.getMonth(),wk=Math.floor(dl/7),hr=dl*24;det.textContent=mo.toLocaleString()+' \u30F6\u6708 | '+wk.toLocaleString()+' \u9031\u9593 | '+dl.toLocaleString()+' \u65E5 | \u7D04 '+hr.toLocaleString()+' \u6642\u9593'}
    function toggleTheme(){const d=document.documentElement;d.setAttribute('data-theme',d.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',d.getAttribute('data-theme'))}
    if(localStorage.getItem('theme'))document.documentElement.setAttribute('data-theme',localStorage.getItem('theme'));calc();
